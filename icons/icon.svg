<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Extension icon: the official Neovim mark (Jason Long, CC-BY-3.0) framed
       inside a browser window. See icons/ATTRIBUTION.md. -->
  <defs>
    <linearGradient x1="50%" y1="0%" x2="50%" y2="100%" id="nv-1">
      <stop stop-color="#16B0ED" stop-opacity="0.800235524" offset="0%"/>
      <stop stop-color="#0F59B2" stop-opacity="0.83700023" offset="100%"/>
    </linearGradient>
    <linearGradient x1="50%" y1="0%" x2="50%" y2="100%" id="nv-2">
      <stop stop-color="#7DB643" offset="0%"/>
      <stop stop-color="#367533" offset="100%"/>
    </linearGradient>
    <linearGradient x1="50%" y1="0%" x2="50%" y2="100%" id="nv-3">
      <stop stop-color="#88C649" stop-opacity="0.8" offset="0%"/>
      <stop stop-color="#439240" stop-opacity="0.84" offset="100%"/>
    </linearGradient>
  </defs>

  <!-- Browser window body -->
  <rect x="4" y="4" width="120" height="120" rx="22" fill="#ffffff"/>
  <!-- Title bar (rounded top corners, flat bottom) -->
  <path d="M 4,38 L 4,26 A 22,22 0 0 1 26,4 L 102,4 A 22,22 0 0 1 124,26 L 124,38 Z" fill="#eef1f6"/>
  <rect x="4" y="37" width="120" height="1.5" fill="#dde3ea"/>
  <!-- Traffic-light dots -->
  <circle cx="22" cy="21" r="5" fill="#ff5f57"/>
  <circle cx="37" cy="21" r="5" fill="#febc2e"/>
  <circle cx="52" cy="21" r="5" fill="#28c840"/>
  <!-- Address bar pill -->
  <rect x="64" y="13" width="52" height="16" rx="8" fill="#f7f9fc" stroke="#dbe1ea" stroke-width="1"/>

  <!-- Neovim mark, centered in the window body -->
  <g transform="translate(37,48) scale(0.09)">
    <g transform="translate(2,3)">
      <path d="M0,155.5704 L155,-1 L154.999997,727 L0,572.237919 L0,155.5704 Z" fill="url(#nv-1)"/>
      <path d="M443.060403,156.982405 L600,-1 L596.818792,727 L442,572.219941 L443.060403,156.982405 Z" fill="url(#nv-2)" transform="translate(521.000000, 363.500000) scale(-1, 1) translate(-521.000000, -363.500000) "/>
      <path d="M154.986294,0 L558,615.189696 L445.224605,728 L42,114.172017 L154.986294,0 Z" fill="url(#nv-3)"/>
      <path d="M155,283.83232 L154.786754,308 L31,124.710606 L42.4619486,113 L155,283.83232 Z" fill-opacity="0.13" fill="#000000"/>
    </g>
  </g>

  <!-- Window border -->
  <rect x="4" y="4" width="120" height="120" rx="22" fill="none" stroke="#cbd2dc" stroke-width="1.5"/>
</svg>
