<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Neovim Scratch</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #1e1e2e;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <!-- Inset the editor by a small margin so the browser window's rounded
         corners only overlap the dark page background, never the Neovim UI.
         The engine frame sizes its grid to this (already-inset) iframe, so no
         corner cells are clipped. -->
    <iframe
      id="nvim"
      src="./engine-frame.html?mode=full"
      style="border: 0; position: absolute; inset: 10px"
    ></iframe>
  </body>
</html>
