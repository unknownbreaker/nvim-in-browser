<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Neovim Scratch</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #1e1e2e;
        overflow: hidden;
      }
      /* Inset the editor by a small margin so the browser window's rounded
         corners only overlap the dark page background, never the Neovim UI.
         The stage is a plain <div>, which DOES stretch to fill via `inset`;
         the iframe (a replaced element) would NOT stretch from `inset` alone —
         it would collapse to its default 300x150 — so it fills the stage at
         100% instead. The engine frame sizes its grid to the inset iframe. */
      #stage {
        position: absolute;
        inset: 10px;
      }
      #nvim {
        display: block;
        border: 0;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <iframe id="nvim" src="./engine-frame.html?mode=full"></iframe>
    </div>
  </body>
</html>
